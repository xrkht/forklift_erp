spring:
  datasource:
    url: ${FORKLIFT_ERP_TEST_DB_URL:jdbc:tc:mysql:8.4.0:///forklift_erp_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${FORKLIFT_ERP_TEST_DB_USERNAME:test}
    password: ${FORKLIFT_ERP_TEST_DB_PASSWORD:test}
    driver-class-name: ${FORKLIFT_ERP_TEST_DB_DRIVER:org.testcontainers.jdbc.ContainerDatabaseDriver}
  flyway:
    clean-disabled: true

jwt:
  secret: ${FORKLIFT_ERP_TEST_JWT_SECRET:forklift-erp-test-jwt-secret-change-me-32-bytes-min}
  expiration: 31536000000
  header: Authorization

forklift:
  seed-demo-data:
    enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
