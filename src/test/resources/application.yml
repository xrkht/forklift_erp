spring:
  datasource:
    url: jdbc:mysql://testcontainers-required/should_be_overridden
    username: forklift
    password: forklift
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    clean-disabled: true

jwt:
  secret: ${FORKLIFT_ERP_TEST_JWT_SECRET:forklift-erp-test-jwt-secret-change-me-32-bytes-min}
  expiration: 31536000000
  header: Authorization

forklift:
  admin:
    business-data-reset:
      enabled: true
  seed-demo-data:
    enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
