name: forklift-erp

services:
  mysql:
    image: mysql:8.0.43
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: forklift_erp
      MYSQL_USER: forklift_erp
      MYSQL_PASSWORD: ${ERP_DB_PASSWORD:?Set ERP_DB_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    image: ${ERP_IMAGE:-forklift-erp}:${ERP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      FORKLIFT_ERP_SERVER_PORT: "8080"
      FORKLIFT_ERP_SSL_ENABLED: "false"
      FORKLIFT_ERP_DB_URL: jdbc:mysql://mysql:3306/forklift_erp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      FORKLIFT_ERP_DB_USERNAME: forklift_erp
      FORKLIFT_ERP_DB_PASSWORD: ${ERP_DB_PASSWORD:?Set ERP_DB_PASSWORD in .env}
      FORKLIFT_ERP_JWT_SECRET: ${ERP_JWT_SECRET:?Set ERP_JWT_SECRET in .env}
      FORKLIFT_ERP_JWT_EXPIRATION: ${ERP_JWT_EXPIRATION:-86400000}
      FORKLIFT_ERP_ADMIN_USERNAME: ${ERP_ADMIN_USERNAME:-admin}
      FORKLIFT_ERP_ADMIN_PASSWORD: ${ERP_ADMIN_PASSWORD:?Set ERP_ADMIN_PASSWORD in .env}
      FORKLIFT_ERP_SEED_DEMO_DATA: "false"
      FORKLIFT_ERP_BUSINESS_DATA_RESET_ENABLED: "false"
      FORKLIFT_ERP_DATA_RESTORE_ENABLED: "false"
      FORKLIFT_ERP_ATTACHMENT_STORAGE_DIR: /data/uploads/attachments
      FORKLIFT_ERP_INVOICE_STORAGE_DIR: /data/uploads/invoices
      FORKLIFT_ERP_CONTRACT_STORAGE_DIR: /data/uploads/contracts
      LOGGING_FILE_NAME: /data/logs/application.log
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${ERP_HTTP_PORT:-8080}:8080"
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs

